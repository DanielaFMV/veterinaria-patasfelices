<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PatasFelices{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f9f4;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background-color: #2e8b6e !important;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .nav-link:hover {
            color: #b2ecd8 !important;
        }
        .btn-primary {
            background-color: #3aafa9;
            border-color: #3aafa9;
        }
        .btn-primary:hover {
            background-color: #2e8b87;
            border-color: #2e8b87;
        }
        .btn-success {
            background-color: #2e8b6e;
            border-color: #2e8b6e;
        }
        .btn-success:hover {
            background-color: #256f58;
            border-color: #256f58;
        }
        table thead {
            background-color: #3aafa9;
            color: white;
        }
        h1, h2 {
            color: #2e8b6e;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'fichas:inicio' %}">🐾 PatasFelices</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'fichas:dueno_lista' %}">Dueños</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'fichas:mascota_lista' %}">Mascotas</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'fichas:dueno_crear' %}">+ Nuevo Dueño</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'fichas:mascota_crear' %}">+ Nueva Mascota</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
